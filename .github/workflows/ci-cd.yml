name: CI/CD Pipeline IA

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)

      - name: Install uv
        uses: [astral-sh/setup-uv@v5](https://github.com)
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync  # Solo instalamos para verificar que el pyproject.toml es correcto

      - name: Set up Docker Buildx
        uses: [docker/setup-buildx-action@v3](https://github.com)

      - name: Build Docker image
        uses: [docker/build-push-action@v6](https://github.com)
        with:
          context: .
          push: false
          tags: house-price-prediction:latest
